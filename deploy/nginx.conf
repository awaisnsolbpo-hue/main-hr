# Simple Nginx config for hiring.duhanashrah.ai
# Frontend: serves static files from dist
# Backend: proxies /api to Node.js

server {
    listen 80;
    server_name hiring.duhanashrah.ai;

    # Frontend - serve dist folder
    root /root/hr-app/frontend/dist;
    index index.html;

    # Handle React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File upload size
    client_max_body_size 50M;
}
